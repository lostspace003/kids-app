name: Build & deploy to Azure Web App

# CI/CD: on every push to main, build the Next.js server app and deploy it to
# the Azure Web App (B1). Runtime config (SQL/Blob/ACS/image keys) lives in the
# Web App's application settings, so the build needs no secrets.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  AZURE_WEBAPP_NAME: gennoor-app-b5ae1c
  NODE_VERSION: "22"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Drop dev-only deps so the deployed package is leaner; `next start` only
      # needs production dependencies plus the prebuilt .next output.
      - name: Prune to production dependencies
        run: npm prune --omit=dev

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
